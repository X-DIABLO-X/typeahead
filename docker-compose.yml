services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: typeahead
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d typeahead"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis-1:
    image: redis:alpine
    ports:
      - "6382:6379"
  redis-2:
    image: redis:alpine
    ports:
      - "6383:6379"
  redis-3:
    image: redis:alpine
    ports:
      - "6384:6379"

  setup:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    command: sh -c "npx prisma generate && npx prisma db push && npx prisma db seed"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/typeahead
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5100:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/typeahead
      REDIS_URLS: redis://redis-1:6379,redis://redis-2:6379,redis://redis-3:6379
      PORT: "5000"
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      setup:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host
    environment:
      DOCKER: "true"
      VITE_DOCKER: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
